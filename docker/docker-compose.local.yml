services:
  sensing-server:
    ports: !override
      - "127.0.0.1:3300:3000"
      - "127.0.0.1:3301:3001"
      - "127.0.0.1:5505:5005/udp"
    environment:
      - CSI_SOURCE=simulated
      - RUST_LOG=info
      - RUVIEW_ALLOW_UNAUTHENTICATED=1

  python-sensing:
    profiles:
      - legacy-python
    ports: !override
      - "127.0.0.1:8765:8765"
      - "127.0.0.1:8080:8080"
